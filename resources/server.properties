# ============================================================
# 服务端配置文件 - 所有倍率/几率常量
# ============================================================
# 修改后重启服务端生效，不需要重新编译
# 支持小数 (如 expMultiplier = 0.1 表示打怪只得 10% 经验)
#
# 配置项说明格式：
#   配置项 = 默认值
#   # 作用：xxx
#   # 范围/说明：xxx

# ======================== 经验倍率 ========================

# 全局经验倍率
# 作用：所有击杀怪物获得的基础经验的整体倍数
# 说明：设为 500 = 500倍经验，设为 0.1 = 只有 10% 经验，设为 0 = 不得经验
server.expMultiplier = 1

# 连击珠经验倍率
# 作用：Combo Kill 掉落的经验珠给予的经验倍率
# 说明：与地图怪物经验无关，单独控制连击珠的经验值
server.comboOrbExpRate = 1

# 多杀奖励经验倍率
# 作用：Multi Kill（一次技能杀死多个怪物）的额外奖励经验系数
# 说明：奖励经验 = 怪物经验 × ((连杀数 - 2) × 5) × 此倍率
server.multiKillBonusExpMultiplier = 0.01

# 燃烧地图每级奖励经验百分比
# 作用：燃烧地图(Burning Field)每级给予的额外经验百分比
# 说明：燃烧等级 × 此值 = 最终额外经验%，如 20级 × 5 = +100% 经验
server.burningFieldBonusExpMultiplierPerLevel = 5

# 每击杀一个怪物获得的情报经验值
# 作用：收藏袋(Familiar)每次击杀获得的经验值
# 说明：用于提升收藏袋等级
server.expPerKill = 1

# 精英冠军珠经验倍率
# 作用：精英冠军(Elite Champion)掉落的经验珠的经验倍率
server.eliteChampionOrbExpMultiplier = 15

# 死亡经验惩罚百分比
# 作用：角色死亡后经验值获取减少的百分比
# 说明：80 = 减少 80% 经验获取，持续一定时间
server.deathPenaltyExpDebuff = 80

# 蓝色经验珠倍率
# 作用：蓝色 Combo Kill 经验珠的经验倍率
server.blueExpOrbMult = 2

# 紫色经验珠倍率
# 作用：紫色 Combo Kill 经验珠的经验倍率
server.purpleExpOrbMult = 3.5

# 红色经验珠倍率
# 作用：红色 Combo Kill 经验珠的经验倍率
server.redExpOrbMult = 5

# 金色经验珠倍率
# 作用：金色 Combo Kill 经验珠的经验倍率（最高级）
server.goldExpOrbMult = 7

# 非战斗等级经验倍率
# 作用：非战斗等级(如工匠、采集等)获得的经验倍率
server.nonCombatLevelMultiplier = 1.0

# ======================== 掉率 ========================

# 全局掉率倍率
# 作用：所有怪物掉落物品的整体倍率
# 说明：1 = 原始掉率，2 = 双倍掉率，以此类推
server.mobDropRate = 1

# 最大掉率判定分母
# 作用：所有掉率判定的最大随机值分母
# 说明：如掉率 25/10000 = 0.25% 概率
server.maxDropChance = 10000

# 怪物掉落 NX 代币的概率(每只)
# 作用：击杀怪物时掉落 NX 代币的基础概率，分母为 maxDropChance
# 说明：25/10000 = 0.25%
server.nxDropChance = 25

# 死亡掉率惩罚百分比
# 作用：角色死亡后掉率减少的百分比
server.deathPenaltyDropDebuff = 80

# 秘密之塔 5 层勋章掉率
# 作用：道场(Tower of Oz)第 5 层勋章掉落概率(百分比)
server.f5MedalDropRate = 90

# 秘密之塔 15 层勋章掉率
server.f15MedalDropRate = 70

# 秘密之塔 25 层勋章掉率
server.f25MedalDropRate = 60

# 秘密之塔 35 层勋章掉率
server.f35MedalDropRate = 50

# 秘密之塔 45 层勋章掉率
server.f45MedalDropRate = 50

# 月光兔(月桥)樱花种子掉率
# 作用：月光兔 PQ 中樱花种子的掉落概率(百分比)
server.primroseSeedDropRate = 80

# ======================== 枫币倍率 ========================

# 全局枫币倍率
# 作用：所有怪物掉落的枫币数量倍率
# 说明：2 = 双倍枫币
server.mobMesoRate = 1

# 枫币掉落数量最小值系数
# 作用：枫币堆的最小数量系数
server.minMoneyMult = 20

# 枫币掉落数量最大值系数
# 作用：枫币堆的最大数量系数
server.maxMoneyMult = 40

# ======================== NX 倍率 ========================

# 全局 NX 代币倍率
# 作用：怪物掉落 NX 代币的数量倍率
server.mobNxRate = 1

# ======================== 怪物刷新 ========================

# 地图默认怪物刷新率(每个刷怪点)
# 作用：每个刷怪点(MobGen)同时存在的最大怪物数量系数
# 说明：1.5 = 每个刷怪点最多 1.5 倍于默认数量的怪物
server.defaultFieldMobRateByMobgenCount = 1.5

# 基础怪物重生时间(毫秒)
# 作用：怪物被击杀后重新刷新的基础间隔时间
# 说明：5000 = 5 秒
server.baseMobRespawnRate = 5000

# Kishin 怪物数量倍率
# 作用：使用 Kishin 技能后地图上怪物数量的增幅
# 说明：1.7 = 怪物数量增加 70%
server.kishinMobMultiplier = 1.7

# Kishin 刷新速度倍率
# 作用：Kishin 技能对怪物重生速度的增幅
server.kishinMobRateMultiplier = 1.7

# 精英怪物刷出概率
# 作用：普通怪物被击杀时生成精英怪物的概率，分母为 1000
# 说明：5/1000 = 0.5%
server.eliteMobSpawnChance = 5

# 精英 Boss 血量倍率
# 作用：精英 Boss 相对于普通怪物的血量倍数
# 说明：500 = 精英 Boss 血量为普通怪物的 500 倍
server.eliteBossHpRate = 500

# ======================== 怪物属性 ========================

# 强化怪物血量倍率
# 作用：Buffed 怪物(如精英怪)的血量倍数
# 说明：1000 = Buffed 怪物血量为普通怪物的 1000 倍
server.buffedMobHpMultiplier = 1000

# 强化怪物伤害倍率
# 作用：Buffed 怪物(如精英怪)的伤害倍数
server.buffedMobDamageMultiplier = 10

# 怪物使用技能概率
# 作用：怪物每次行动时使用技能的概率(百分比)
server.mobSkillChance = 20

# 怪物普通攻击概率
# 作用：怪物每次行动时使用普通攻击的概率(百分比)
server.mobAttackChance = 40

# ======================== 潜能/内在/星岩 ========================

# 内在能力升级基础概率
# 作用：内在能力(Inner Ability)升级时的基础成功概率(百分比)
server.baseCharPotUpRate = 10

# 掉落装备获得传说潜能的概率(分母 100)
# 作用：怪物掉落的装备直接获得传说级潜能的概率
# 说明：1/100 = 1%
server.randomEquipUniqueChance = 1

# 掉落装备获得稀有潜能的概率(分母 100)
server.randomEquipEpicChance = 3

# 掉落装备获得普通潜能的概率(分母 100)
server.randomEquipRareChance = 8

# 第三条潜能出现概率(百分比)
# 作用：装备洗潜能时出现第三条潜能线的概率
server.thirdLineChance = 50

# 主属性(Prime Line)出现概率(百分比)
# 作用：潜能洗炼时主属性词条的出现概率
server.primeLineChance = 15

# 星岩 D 级出现比例
# 作用：星岩(Nebulite)生成时 D 级星岩的权重
server.nebDProp = 40

# 星岩 C 级出现比例
server.nebCProp = 20

# 星岩 B 级出现比例
server.nebBProp = 15

# 星岩 A 级出现比例
server.nebAProp = 15

# 星岩 S 级出现比例
server.nebSProp = 10

# ======================== 符文 ========================

# 符文诅咒每级经验/掉落减少百分比
# 作用：符文诅咒(Rune Curse)每层减少的经验/掉率百分比
# 说明：25 = 每级诅咒减少 25% 经验和掉率
server.runeCurseMultiplierPerLevel = 25

# 符文刷出概率(分母 10000)
# 作用：地图上生成符文的基础概率
# 说明：100/10000 = 1%
server.runeSpawnChance = 100

# ======================== 随机传送门 ========================

# 随机传送门刷出概率(分母 10000)
# 作用：怪物击杀后刷出随机传送门的概率
# 说明：25/10000 = 0.25%
server.randomPortalSpawnChance = 25

# ======================== 收藏袋 ========================

# 收藏袋(Familiar)升阶概率(百分比)
# 作用：收藏袋合成时提升稀有度的基础概率
server.rankUpChance = 4

# 收藏袋第二条潜能为主属性的概率(百分比)
# 作用：收藏袋潜能洗炼时第二条词条为主属性的概率
server.secondaryLinePrimeChance = 50

# ======================== 核心宝石 ========================

# 核心宝石开出本职业技能的概率(百分比)
# 作用：开启核心宝石(Nodestone)时获得本职业技能核心的概率
server.nodeSelfJobChance = 75

# 核心强化成功概率(百分比)
# 作用：核心等级强化时的基础成功概率
server.nodeEnforceChance = 60

# 核心技能强化概率(百分比)
# 作用：核心内技能等级提升的概率
server.nodeSkillChance = 30

# ======================== 惊喜任务 ========================

# 惊喜任务(Surprise Mission)触发概率(百分比)
# 作用：满足条件时惊喜任务刷出的基础概率
server.surpriseMissionChance = 5

# ======================== 首领怪物 ========================

# 路西德 Lotus 落石地板触发概率(百分比)
# 作用：路西德 Boss 战中落石地板生成的概率
server.lotusFallingFootholdChance = 60

# 混沌龙王的血量倍率
# 作用：混沌难度的龙王(Chaos Horntail)相对于普通的血量倍数
server.horntailChaosMultiplier = 4

# 巨花(Gollux)掉落宝石概率(百分比)
server.golluxDropStoneChance = 25

# 首领水晶出售价格增幅(百分比)
# 作用：首领水晶(Boss Crystal)出售给商店时的额外涨价幅度
# 说明：0 = 原价出售
server.bossCrystalPriceIncrease = 0

# 秘密之塔史莱姆国王击杀数量倍率
# 作用：秘密之塔(Tower of Oz)中史莱姆国王击杀计数的倍率
# 说明：30 = 击杀 1 只算 30 只
server.kingSlimeMultiplier = 30

# ======================== 交易/税收 ========================

# 拍卖行税率
# 作用：拍卖行交易成功后卖家实际获得的金额比例
# 说明：0.95 = 收取 5% 手续费，卖家获得 95%
server.auctionTax = 0.95

# 金枫叶(GML)兑换税率(百分比)
# 作用：金枫叶兑换时的扣税比例
server.gmlTax = 10

# 枫叶金币(MLG)兑换税率(百分比)
server.mlgTax = 20

# ======================== 杂项 ========================

# 缓存清理间隔(小时)
# 作用：服务器缓存数据自动清理的时间间隔
server.clearCacheRate = 4

# 测谎仪触发概率(1/N)
# 作用：玩家行为触发测谎仪(Lie Detector)的概率
# 说明：7000 = 1/7000 概率触发
server.lieDetectorChance = 7000

# ======================== 属性系数 ========================

# 力量对 HP 的加成系数
# 作用：每点力量(STR)额外增加 HP 的倍率
server.strHpMult = 1.5

# 力量对 MP 的加成系数
server.strMpMult = 0.75

# 智力对 HP 的加成系数
server.intHpMult = 0.75

# 智力对 MP 的加成系数
server.intMpMult = 1.5

# ======================== 职业技能常数 ========================

# 战神(Arran)连接技能 HP 治愈概率(百分比)
# 作用：战神 Legion 卡牌效果触发 HP 恢复的概率
server.chanceToHealHp = 70

# 龙神(Evan)连接技能 MP 治愈概率(百分比)
server.chanceToHealMp = 70

# 隐月寒冰掌 Boss 模式触发概率(百分比)
server.chillingStepBossModeProcChance = 90

# 英雄龙之袭击 debuff 持续时间倍率
# 作用：英雄(Hero)技能"龙之袭击"debuff 持续时间的倍数
server.dragonStrikeDebuffDurationMultiplier = 3

# 炎术士轨道烈焰射程倍率
# 作用：炎术士(Blaze Wizard)轨道烈焰技能射程的倍数
server.orbitalFlameRangeMultiplier = 1.5

# 风灵使者玄月风每秒钟加速倍率
# 作用：风灵使者(Wind Archer)玄月风技能每秒钟提升的攻击速度
server.trifflingWindSimpactMultiplierPerSecond = 5

# 风灵使者玄月风最大加速倍率
# 作用：风灵使者玄月风技能可达到的最大攻击速度倍率
server.trifflingWindSimpactMultiplierMax = 6

# 夜行者暗影之矛触发概率(百分比)
# 作用：夜行者(Night Lord)暗影之矛技能每次攻击触发的概率
server.netherShieldByExecutionChance = 40

# 魂骑士剑意能量获取倍率
# 作用：魂骑士(Soul Master)剑意技能获取能量的倍率
server.godOfBladesBladeEnergyMultiplier = 2

# 风灵使者进阶风之墙持续时间倍率
# 作用：风灵使者进阶风之墙/地震技能的持续时间倍率
server.advancedTilesDurationMultiplier = 2

# 超能力者精神冲击最终伤害倍率
# 作用：超能力者(Kinesis)精神冲击技能每层最终伤害的倍率
server.mindBreakFdMultiplier = 3

# 精英冠军最小伤害贡献比例要求
# 作用：玩家要获得精英冠军(Elite Champion)奖励所需的最低伤害贡献占比
# 说明：3 = 至少造成怪物总血量 3 倍的伤害才有奖励
server.eliteChampionMinDmgRatioForReward = 3

# ======================== 宠物吸物(宠吸) ========================
# 宠吸配置在 resources/pet.properties，此处仅作参考
# petVacuum.range = 400       # 拾取范围(像素)
# petVacuum.interval = 1200   # 拾取间隔(毫秒)

# ======================== 显示选项 ========================

# 是否显示角色升级特效
# 作用：角色升级时是否播放全屏升级特效（包含击杀怪物动画效果）
# 说明：true = 显示升级特效，false = 关闭升级特效（升级过程静默，只加属性）
server.showLevelUpEffect = true

# ======================== 其他 ========================

# 地图不存在时的默认回城地图 ID
# 作用：当目标地图不存在或加载失败时，将角色发送到此地图
server.defaultFieldID = 100000000
